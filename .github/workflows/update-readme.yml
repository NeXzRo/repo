name: Update Plugin List
on:
  push:
    paths:
      - 'repo.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Update README
        run: |
          LIST=$(jq -r '.[] | "* [**\(.Name)**](\(.RepoUrl)) `v\(.AssemblyVersion)` — \(.Punchline)"' repo.json)
          python3 -c "
          import sys
          with open('README.md', 'r') as f: content = f.read()
          start_marker, end_marker = '<!-- START_LIST -->', '<!-- END_LIST -->'
          if start_marker in content and end_marker in content:
              before = content.split(start_marker)[0]
              after = content.split(end_marker)[1]
              new_content = before + start_marker + '\n' + sys.stdin.read() + '\n' + end_marker + after
              with open('README.md', 'w') as f: f.write(new_content)
          " <<EOF
          $LIST
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "docs: update plugin list in README"
            git push
          else
            echo "No changes to commit"
          fi