name: Update Plugin List
on:
  push:
    paths:
      - 'repo.json'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Plugin List
        run: |
          LIST=$(jq -r '.[] | "* [**\(.Name)**](\(.RepoUrl)) `v\(.AssemblyVersion)` — \(.Punchline)"' repo.json)
          sed -i '/<!-- START_LIST -->/,/<!-- END_LIST -->/{//!d;}' README.md
          sed -i '/<!-- START_LIST -->/a '"$LIST"'' README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update plugin list in README" || exit 0
          git push
          