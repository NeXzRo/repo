name: Update Plugin List
on:
  push:
    paths:
      - 'repo.json'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README
        run: |
          sed '/<!-- START_LIST -->/q' README.md > README.new
          jq -r '.[] | "* [**\(.Name)**](\(.RepoUrl)) `v\(.AssemblyVersion)` — \(.Punchline)"' repo.json >> README.new
          sed -n '/<!-- END_LIST -->/,$p' README.md >> README.new
          mv README.new README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "docs: update plugin list in README"
            git push
          else
            echo "No changes to commit"
          fi