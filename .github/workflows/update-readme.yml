name: Update Plugin List
on:
  push:
    paths:
      - 'repo.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Update README
        run: |
          COUNT=$(jq '. | length' repo.json)
          LIST=$(jq -r '.[] | .RepoUrl as $url | ($url | sub("/$"; "") | sub(".git$"; "") | split("/") | .[-2] + "/" + .[-1]) as $repo | "* [**\(.Name)**](\($url)) `v\(.AssemblyVersion)` — \(.Punchline) ![Downloads](https://img.shields.io/github/downloads/\($repo)/total?style=flat-square&label=%20&color=success)"' repo.json || echo "")
          if [ -z "$LIST" ]; then
            exit 1
          fi
          python3 -c "
          import sys
          import os
          import re
          
          files = [f for f in os.listdir('.') if f.lower() == 'readme.md']
          if not files:
              sys.exit(1)
          
          filename = files[0]
          with open(filename, 'r', encoding='utf-8') as f:
              content = f.read()
          
          content = re.sub(r'badge/Plugins-\d+-blue', f'badge/Plugins-{sys.argv[1]}-blue', content)
          
          start_m = '<!-- START_LIST -->'
          end_m = '<!-- END_LIST -->'
          
          if start_m in content and end_m in content:
              pattern = re.compile(f'{start_m}.*?{end_m}', re.DOTALL)
              replacement = f'{start_m}\n{sys.stdin.read()}\n{end_m}'
              new_content = pattern.sub(replacement, content)
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(new_content)
          else:
              sys.exit(1)
          " "$COUNT" <<EOF
          $LIST
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "docs: update plugin list and moved badges"
            git push
          else
            echo "No changes to commit"
          fi